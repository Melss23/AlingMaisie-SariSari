<!DOCTYPE html>
<html>
<head>
  <title>Sari-Sari POS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- EXCEL EXPORT -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f9;
    }

    .header {
      background: #4CAF50;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .nav {
      display: flex;
      background: white;
      border-bottom: 1px solid #ddd;
    }

    .nav button {
      flex: 1;
      padding: 12px;
      border: none;
      background: white;
      font-size: 14px;
      cursor: pointer;
      color: #222;
    }

    .nav button:hover {
      background: #f0f0f0;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      box-sizing: border-box;
      font-size: 16px;
      border-radius: 8px;
    }

    input {
      border: 1px solid #ccc;
    }

    button {
      border: none;
      cursor: pointer;
      background: #4CAF50;
      color: white;
      font-weight: bold;
    }

    button:hover {
      opacity: 0.95;
    }

    .hidden {
      display: none !important;
    }

    .scan-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .secondary-btn {
      background: #f44336;
    }

    .info-box {
      margin-top: 15px;
      padding: 12px;
      background: #f8f8f8;
      border-radius: 8px;
      line-height: 1.6;
    }

    .status {
      margin-top: 10px;
      font-size: 14px;
      color: #333;
    }

    #report {
      margin-top: 15px;
      line-height: 1.8;
    }

    #scannerWrap {
      margin-top: 12px;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
      position: relative;
      width: 100%;
      min-height: 220px;
    }

    #scannerPreview {
      width: 100%;
      display: block;
      background: #000;
    }

    .scan-guide {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 82%;
      height: 110px;
      transform: translate(-50%, -50%);
      border: 2px solid rgba(0,255,0,0.9);
      border-radius: 10px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.18);
      pointer-events: none;
    }

    .scan-tip {
      font-size: 12px;
      color: #666;
      margin-top: 8px;
    }
  </style>
</head>

<body>

<div class="header">🛒 Sari-Sari POS</div>

<!-- LOGIN -->
<div id="loginPage" class="container">
  <div class="card">
    <h3>Login</h3>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <div class="nav">
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('pos')">Transaction</button>
    <button onclick="showPage('admin')" id="adminBtn">Admin</button>
  </div>

  <div class="container">

    <div id="home" class="card page-section">
      <h2>Welcome</h2>
      <p>📢 System Ready</p>
    </div>

    <div id="pos" class="card page-section hidden">
      <h2>Transaction</h2>

      <div id="scannerWrap">
        <video id="scannerPreview" autoplay muted playsinline></video>
        <div class="scan-guide"></div>
      </div>

      <div class="status" id="scanStatus">Scanner idle</div>

      <div class="scan-actions">
        <button onclick="startScan()">📷 Start Scan</button>
        <button class="secondary-btn" onclick="stopScan()">⛔ Stop</button>
      </div>

      <input id="barcode" placeholder="Scan or enter barcode">

      <div class="info-box">
        <div id="pname">Product: -</div>
        <div id="pprice">Price: -</div>
        <div>Stock: <span id="pstock">-</span></div>
      </div>

      <input id="qty" type="number" value="1" min="1">
      <button onclick="buy()">Buy</button>
    </div>

    <div id="admin" class="card page-section hidden">
      <h2>Admin</h2>
      <button onclick="load()">Refresh</button>
      <button onclick="exportExcel()">Export Excel</button>
      <button onclick="topSelling()">Top Selling</button>
      <div id="report"></div>
    </div>

  </div>
</div>

<script type="module">
import { BrowserMultiFormatReader } from "https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/+esm";

let URL = "https://script.google.com/macros/s/AKfycbxGV7iwQ3CSW3mi_dzk5J5ekrmL_MkJNVBIz0Yw8II/dev";

let products = {};
let sales = [];
let codeReader = null;

const barcode = document.getElementById("barcode");
const qty = document.getElementById("qty");
const pname = document.getElementById("pname");
const pprice = document.getElementById("pprice");
const pstock = document.getElementById("pstock");
const report = document.getElementById("report");

window.login = async function () {
  if (user.value === "admin" && pass.value === "1234") {
    adminBtn.style.display = "block";
  } else if (user.value === "cashier" && pass.value === "1234") {
    adminBtn.style.display = "none";
  } else {
    alert("Invalid login");
    return;
  }

  loginPage.classList.add("hidden");
  app.classList.remove("hidden");

  await load();
  showPage("home");
};

window.showPage = function(id){
  document.querySelectorAll(".page-section").forEach(x=>x.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
};

async function load(){
  const res = await fetch(URL);
  const data = await res.json();

  products = {};
  data.products.slice(1).forEach(r=>{
    products[String(r[0]).trim()] = {
      name:r[1],
      srp:Number(r[2])||0,
      margin:Number(r[3])||0,
      stock:Number(r[4])||0
    };
  });

  sales = data.sales || [];
}

barcode.addEventListener("input", ()=>{
  const p = products[barcode.value.trim()];

  if(p){
    pname.innerText = "Product: "+p.name;
    pprice.innerText = "Price: ₱"+p.srp.toFixed(2);
    pstock.innerText = p.stock;
  } else {
    pname.innerText = "Product: NOT FOUND";
    pprice.innerText = "Price: -";
    pstock.innerText = "-";
  }
});

window.buy = async function(){

  const code = barcode.value.trim();
  const p = products[code];
  const q = Number(qty.value);

  if(!p) return alert("Product not found");
  if(!q || q<=0) return alert("Invalid qty");
  if(p.stock < q) return alert("Not enough stock");

  await fetch(URL,{
    method:"POST",
    headers:{"Content-Type":"text/plain;charset=utf-8"},
    body:JSON.stringify({
      barcode:code,
      name:p.name,
      qty:q,
      total:p.srp*q,
      profit:(p.margin||0)*q
    })
  });

  alert("Saved");
  barcode.value="";
  qty.value=1;
  await load();
};

window.exportExcel = function(){

  if(!sales || sales.length<=1){
    alert("No data");
    return;
  }

  const data = sales.slice(1).map(s=>({
    Date:s[0],
    Product:s[1],
    Qty:s[2],
    Total:s[3],
    Profit:s[4]
  }));

  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Sales");
  XLSX.writeFile(wb, "sales.xlsx");
};

window.topSelling = function(){

  const map={};

  sales.slice(1).forEach(s=>{
    map[s[1]]=(map[s[1]]||0)+Number(s[2]);
  });

  report.innerHTML = Object.entries(map)
    .sort((a,b)=>b[1]-a[1])
    .map(x=>x[0]+" - "+x[1]+" pcs")
    .join("<br>") || "No data";
};

window.startScan = async function(){
  codeReader = new BrowserMultiFormatReader();
  const devices = await BrowserMultiFormatReader.listVideoInputDevices();
  const id = devices.find(d=>/back|rear/i.test(d.label))?.deviceId || devices[0].deviceId;

  codeReader.decodeFromVideoDevice(id,"scannerPreview",(res)=>{
    if(res){
      barcode.value = res.getText();
      barcode.dispatchEvent(new Event("input"));
      stopScan();
    }
  });
};

window.stopScan = function(){
  if(codeReader) codeReader.reset();
};
</script>

</body>
</html>
