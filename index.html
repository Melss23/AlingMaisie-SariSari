<!DOCTYPE html>
<html>
<head>
  <title>Sari-Sari POS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- SCANNER -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <!-- EXCEL EXPORT -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f9;
    }

    .header {
      background: #4CAF50;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .nav {
      display: flex;
      background: white;
      border-bottom: 1px solid #ddd;
    }

    .nav button {
      flex: 1;
      padding: 12px;
      border: none;
      background: white;
      font-size: 14px;
      cursor: pointer;
    }

    .nav button:hover {
      background: #f0f0f0;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      box-sizing: border-box;
      font-size: 16px;
      border-radius: 8px;
    }

    input {
      border: 1px solid #ccc;
    }

    button {
      border: none;
      cursor: pointer;
      background: #4CAF50;
      color: white;
      font-weight: bold;
    }

    button:hover {
      opacity: 0.95;
    }

    .hidden {
      display: none;
    }

    #video {
      width: 100%;
      margin-top: 12px;
      overflow: hidden;
      border-radius: 10px;
      background: #000;
    }

    #video video {
      width: 100% !important;
      border-radius: 10px;
    }

    .scan-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .secondary-btn {
      background: #f44336;
    }

    .info-box {
      margin-top: 15px;
      padding: 12px;
      background: #f8f8f8;
      border-radius: 8px;
      line-height: 1.6;
    }

    .status {
      margin-top: 10px;
      font-size: 14px;
      color: #333;
    }

    #report {
      margin-top: 15px;
      line-height: 1.8;
    }
  </style>
</head>

<body>

<div class="header">🛒 Sari-Sari POS</div>

<!-- LOGIN -->
<div id="loginPage" class="container">
  <div class="card">
    <h3>Login</h3>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <div class="nav">
    <button onclick="show('home')">Home</button>
    <button onclick="show('pos')">Transaction</button>
    <button onclick="show('admin')" id="adminBtn">Admin</button>
  </div>

  <div class="container">

    <!-- HOME -->
    <div id="home" class="card">
      <h2>Welcome</h2>
      <p>📢 System Ready</p>
    </div>

    <!-- POS -->
    <div id="pos" class="card hidden">
      <h2>Transaction</h2>

      <input id="barcode" inputmode="numeric" autocomplete="off" placeholder="Scan or enter barcode">

      <div class="scan-actions">
        <button onclick="startScan()">📷 Scan Barcode</button>
        <button class="secondary-btn" onclick="stopScan()">⛔ Stop</button>
      </div>

      <div id="video"></div>

      <div class="status" id="scanStatus">Scanner idle</div>

      <div class="info-box">
        <div id="pname">Product: -</div>
        <div id="pprice">Price: -</div>
        <div>Stock: <span id="pstock">-</span></div>
      </div>

      <input id="qty" type="number" value="1" min="1">

      <button onclick="buy()">Buy</button>
    </div>

    <!-- ADMIN -->
    <div id="admin" class="card hidden">
      <h2>Admin</h2>
      <button onclick="load()">Refresh</button>
      <button onclick="exportExcel()">Export Excel</button>
      <button onclick="topSelling()">Top Selling</button>
      <div id="report"></div>
    </div>

  </div>
</div>

<script>
//////////////////////////////////////////////////
// CONFIG
//////////////////////////////////////////////////

let URL = "https://script.google.com/macros/s/AKfycby6lyDIk9Gtdgk3hyIrDeWF3a5-PUdGw_UE98a2vFplhj6ln1RFY45gJYRVghCpQU0C/exec";

let products = {};
let sales = [];

let html5QrCode = null;
let scannerRunning = false;
let lastScannedCode = "";
let lastScannedAt = 0;
let scanCooldownMs = 1500;

//////////////////////////////////////////////////
// DOM REFERENCES
//////////////////////////////////////////////////

const barcode = document.getElementById("barcode");
const qty = document.getElementById("qty");
const pname = document.getElementById("pname");
const pprice = document.getElementById("pprice");
const pstock = document.getElementById("pstock");
const report = document.getElementById("report");
const adminBtn = document.getElementById("adminBtn");
const loginPage = document.getElementById("loginPage");
const app = document.getElementById("app");
const user = document.getElementById("user");
const pass = document.getElementById("pass");
const scanStatus = document.getElementById("scanStatus");

//////////////////////////////////////////////////
// LOGIN
//////////////////////////////////////////////////

async function login() {
  if (user.value === "admin" && pass.value === "1234") {
    adminBtn.style.display = "block";
  } else if (user.value === "cashier" && pass.value === "1234") {
    adminBtn.style.display = "none";
  } else {
    alert("Invalid login");
    return;
  }

  loginPage.classList.add("hidden");
  app.classList.remove("hidden");

  await load();
  show("home");
}

//////////////////////////////////////////////////
// NAV
//////////////////////////////////////////////////

function show(id) {
  document.querySelectorAll(".card").forEach(c => c.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

//////////////////////////////////////////////////
// LOAD DATA
//////////////////////////////////////////////////

async function load() {
  try {
    let res = await fetch(URL);
    let data = await res.json();

    products = {};
    if (data.products && data.products.length > 1) {
      data.products.slice(1).forEach(r => {
        products[String(r[0]).trim()] = {
          name: r[1],
          srp: Number(r[2]),
          margin: Number(r[3]),
          stock: Number(r[4])
        };
      });
    }

    sales = data.sales || [];
  } catch (err) {
    alert("Failed to load data");
    console.error(err);
  }
}

//////////////////////////////////////////////////
// AUTO PRODUCT LOAD
//////////////////////////////////////////////////

barcode.addEventListener("input", () => {
  let code = barcode.value.trim();
  let p = products[code];

  if (p) {
    pname.innerText = "Product: " + p.name;
    pprice.innerText = "Price: ₱" + p.srp.toFixed(2);
    pstock.innerText = p.stock;
  } else {
    pname.innerText = "Product: NOT FOUND";
    pprice.innerText = "Price: -";
    pstock.innerText = "-";
  }
});

//////////////////////////////////////////////////
// BUY
//////////////////////////////////////////////////

async function buy() {
  let code = barcode.value.trim();
  let p = products[code];
  let q = parseInt(qty.value, 10);

  if (!p) {
    alert("Product not found");
    return;
  }

  if (!q || q <= 0) {
    alert("Invalid quantity");
    return;
  }

  if (p.stock < q) {
    alert("Not enough stock");
    return;
  }

  try {
    let res = await fetch(URL, {
      method: "POST",
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },
      body: JSON.stringify({
        barcode: code,
        name: p.name,
        qty: q,
        total: p.srp * q,
        profit: p.margin * q
      })
    });

    alert(await res.text());

    barcode.value = "";
    qty.value = 1;
    pname.innerText = "Product: -";
    pprice.innerText = "Price: -";
    pstock.innerText = "-";

    await load();
    barcode.focus();
  } catch (err) {
    alert("Failed to save transaction");
    console.error(err);
  }
}

//////////////////////////////////////////////////
// EXPORT
//////////////////////////////////////////////////

function exportExcel() {
  let formatted = (sales || []).slice(1).map(s => ({
    Date: s[0],
    Product: s[1],
    Qty: s[2],
    Total: s[3],
    Profit: s[4]
  }));

  let ws = XLSX.utils.json_to_sheet(formatted);
  let wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Sales");

  XLSX.writeFile(wb, "sales.xlsx");
}

//////////////////////////////////////////////////
// TOP SELLING
//////////////////////////////////////////////////

function topSelling() {
  let map = {};

  (sales || []).slice(1).forEach(s => {
    map[s[1]] = (map[s[1]] || 0) + Number(s[2]);
  });

  let html = Object.entries(map)
    .sort((a, b) => b[1] - a[1])
    .map(i => i[0] + " - " + i[1] + " pcs")
    .join("<br>");

  report.innerHTML = html || "No sales data";
}

//////////////////////////////////////////////////
// SCANNER
//////////////////////////////////////////////////

async function startScan() {
  try {
    if (!window.Html5Qrcode) {
      alert("Scanner library not loaded");
      return;
    }

    if (scannerRunning) {
      return;
    }

    document.getElementById("video").innerHTML = "";
    scanStatus.innerText = "Starting camera...";

    html5QrCode = new Html5Qrcode("video");

    const cameras = await Html5Qrcode.getCameras();

    if (!cameras || cameras.length === 0) {
      scanStatus.innerText = "No camera found";
      alert("No camera found");
      return;
    }

    let preferredCameraId = cameras[0].id;

    for (const cam of cameras) {
      const label = (cam.label || "").toLowerCase();
      if (
        label.includes("back") ||
        label.includes("rear") ||
        label.includes("environment")
      ) {
        preferredCameraId = cam.id;
        break;
      }
    }

    const isMobile = /iphone|ipad|ipod|android/i.test(navigator.userAgent);
    const scanBox = isMobile
      ? { width: Math.min(window.innerWidth * 0.78, 320), height: 140 }
      : { width: 320, height: 160 };

    scannerRunning = true;

    await html5QrCode.start(
      { deviceId: { exact: preferredCameraId } },
      {
        fps: 15,
        qrbox: scanBox,
        aspectRatio: 1.7778,
        disableFlip: false,
        experimentalFeatures: {
          useBarCodeDetectorIfSupported: true
        },
        formatsToSupport: [
          Html5QrcodeSupportedFormats.CODE_128,
          Html5QrcodeSupportedFormats.CODE_39,
          Html5QrcodeSupportedFormats.EAN_13,
          Html5QrcodeSupportedFormats.EAN_8,
          Html5QrcodeSupportedFormats.UPC_A,
          Html5QrcodeSupportedFormats.UPC_E,
          Html5QrcodeSupportedFormats.ITF
        ],
        videoConstraints: {
          facingMode: { ideal: "environment" }
        }
      },
      onScanSuccess,
      onScanFailure
    );

    scanStatus.innerText = "Scanner running";
  } catch (err) {
    scannerRunning = false;

    if (html5QrCode) {
      try {
        await html5QrCode.clear();
      } catch (e) {}
      html5QrCode = null;
    }

    scanStatus.innerText = "Camera error";
    alert("Camera error: " + (err.message || err));
  }
}

async function stopScan() {
  scanStatus.innerText = "Stopping scanner...";

  if (!html5QrCode) {
    scannerRunning = false;
    scanStatus.innerText = "Scanner idle";
    return;
  }

  try {
    await html5QrCode.stop();
  } catch (e) {
  }

  try {
    await html5QrCode.clear();
  } catch (e) {
  }

  html5QrCode = null;
  scannerRunning = false;
  scanStatus.innerText = "Scanner stopped";
}

function onScanSuccess(decodedText) {
  const cleanCode = String(decodedText || "").trim();
  const now = Date.now();

  if (!cleanCode) return;

  if (cleanCode === lastScannedCode && now - lastScannedAt < scanCooldownMs) {
    return;
  }

  lastScannedCode = cleanCode;
  lastScannedAt = now;

  barcode.value = cleanCode;
  barcode.dispatchEvent(new Event("input"));

  if (products[cleanCode]) {
    scanStatus.innerText = "Scanned: " + cleanCode;
    stopScan();
    barcode.focus();
  } else {
    scanStatus.innerText = "Barcode not found in product list";
  }
}

function onScanFailure(error) {
}

//////////////////////////////////////////////////
// UX
//////////////////////////////////////////////////

document.addEventListener("visibilitychange", () => {
  if (document.hidden && scannerRunning) {
    stopScan();
  }
});

window.addEventListener("beforeunload", () => {
  if (scannerRunning) {
    stopScan();
  }
});
</script>

</body>
</html>
